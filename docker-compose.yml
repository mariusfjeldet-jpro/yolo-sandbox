services:
  yolo-sandbox:
    build: 
      context: .
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      # 1. Persist the entire home directory (catches all hidden auth files, bash history, etc.)
      - home_data:/home/pwuser
      # 2. Overlay your local code folder inside the persistent home directory
      - ${PROJECTS_PATH}:/home/pwuser/sandbox:Z
    ports:
      - "18888:18888"
    stdin_open: true
    tty: true
    deploy:
      resources:
        limits:
          memory: ${MAX_MEMORY}
          cpus: ${MAX_CPUS}

volumes:
  # Replace the piecemeal volumes with one master volume for the user
  home_data: