services:
  yolo-sandbox:
    build: 
      context: .
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      # Keep the projects folder as a bind mount so you can code in Windows
      # We will handle this folder creation in a script below
      - ${PROJECTS_PATH}:/home/pwuser/sandbox:Z
      # Use Named Volumes for configs - Podman creates these automatically
      - claude_data:/home/pwuser/.claude
      - config_data:/home/pwuser/.config
      - gh_data:/home/pwuser/.config/gh
    ports:
      - "18888:18888"
    stdin_open: true
    tty: true
    deploy:
      resources:
        limits:
          memory: ${MAX_MEMORY}
          cpus: ${MAX_CPUS}

volumes:
  claude_data:
  config_data:
  gh_data: