services:
  yolo-sandbox:
    build: 
      context: .
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      # Persist the entire home directory (catches all hidden auth files, bash history, etc.)
      # sandbox/ lives inside this volume on a native Linux filesystem - no NTFS bind mount needed
      - home_data:/home/pwuser
    ports:
      - "18888:18888"
    privileged: true
    stdin_open: true
    tty: true
    deploy:
      resources:
        limits:
          memory: ${MAX_MEMORY}
          cpus: ${MAX_CPUS}

volumes:
  # Replace the piecemeal volumes with one master volume for the user
  home_data: